<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}自動スカウト管理{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #1a1a2e; }
    .sidebar .nav-link { color: #ccc; border-radius: 6px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.1); color: #fff; }
    .sidebar .brand { font-size: 1rem; font-weight: 700; color: #fff; padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,.1); }
    .stat-card { border: none; border-radius: 12px; transition: transform .15s; }
    .stat-card:hover { transform: translateY(-2px); }
    .badge-platform { font-size: .7rem; }
    .message-preview { white-space: pre-wrap; font-size: .85rem; background: #f8f9fa; border-radius: 8px; max-height: 120px; overflow: hidden; }
    .message-preview.expanded { max-height: none; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3" style="width:220px; position:fixed; top:0; bottom:0; overflow-y:auto;">
    <div class="brand"><i class="bi bi-send-fill me-2"></i>AutoScout</div>
    <nav class="nav flex-column mt-3 gap-1">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i>ダッシュボード
      </a>
      <a href="/scouts" class="nav-link {% if request.path.startswith('/scouts') %}active{% endif %}">
        <i class="bi bi-people me-2"></i>スカウト履歴
      </a>
      <a href="/mappings" class="nav-link {% if request.path.startswith('/mappings') %}active{% endif %}">
        <i class="bi bi-tags me-2"></i>マッピング設定
      </a>
      <a href="/export.csv" class="nav-link">
        <i class="bi bi-download me-2"></i>CSV エクスポート
      </a>
    </nav>
  </div>

  <!-- Main -->
  <div class="flex-grow-1 p-4" style="margin-left:220px;">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
